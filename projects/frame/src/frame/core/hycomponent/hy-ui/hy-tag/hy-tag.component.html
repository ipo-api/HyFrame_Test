
<div class="tag-box">
    <ng-container *ngIf="_datas && _datas.length>0">
        <nz-tag *ngFor="let item of _datas" [nzMode]="item?.mode ? item?.mode === 'close' ? 'closeable' : item?.mode === 'check' ? 'checkable' : 'default' : 'default'" [nzColor]="item?.color" (nzOnClose)="remove(item)" (nzCheckedChange)="checkedChange(item)">{{item?.title}}</nz-tag>
    </ng-container>
    <ng-container *ngIf="showNewTag">
        <nz-tag *ngIf="!inputVisible" class="editable-tag" nzNoAnimation (click)="showInput()"> <i nz-icon nzType="plus"></i> New Tag </nz-tag>
        <input
          #inputElement
          nz-input
          nzSize="small"
          *ngIf="inputVisible"
          type="text"
          [(ngModel)]="inputValue"
          style="width: 78px;"
          (blur)="handleInputConfirm()"
          (keydown.enter)="handleInputConfirm()"
        />
    </ng-container>
</div>
