<div class="hy-col-{{flex == undefined ? cols : 0}}"  [ngStyle]="{display: flex == undefined ? 'block' : 'inline-block'}"  title="">
  <nz-form-item class="hy-form-item" >
    <hy-comm-label
      *ngIf="!noLabel"
      [noLabel]="noLabel"
      [labelWidth]="labelWidth" 
      [ckRequired]="ckRequired" 
      [noColon]="noColon" 
      [title]="title" 
      [isWrap]="isLabelWrap ?? tableService.isLabelWrap">
    </hy-comm-label>
    <nz-form-control [ngStyle]="{width: flex == undefined ? '100%' : flex}" [nzValidateStatus]="formControl.pristine ? 'success' : formControl"  >
      <hy-checkbox-detail
        [model]="modelService[tableService.modelName][modelName]"
        [items]="dicService.getFromCache(dicName, modelService)"
        (data)="setData($event)"
        [enableAllow]="enableAllow"
        [showCheckAll]="showCheckAll"
        [onelineNum]="onelineNum"
        (clickOneCheck)="clickCheck($event)"
        [inPutFormControl]="formControl"
        [enable]="!enable || !tableService.enable"
        [flex]="flexWidth"
        [isEllipsis]="isEllipsis"
        (clickAllCheck)="clickAllCheck($event)"
      >
      </hy-checkbox-detail>
    </nz-form-control>
  </nz-form-item>
</div>
