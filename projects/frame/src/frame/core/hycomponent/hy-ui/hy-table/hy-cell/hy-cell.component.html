<div [ngSwitch]="type" [class]="backgroundColor ? 'hy-cell-background-'+backgroundColor : ''" [ngClass]="{'hy-cell-background':backgroundColor}">
  <div *ngSwitchCase="'text'">
    <div
      style="word-break: break-all;"
      [ngStyle]="textStyle"
      [title]="this.tableService.isEllipsis ==true ? item[modelName] : ''"
      class="{{ textClass }}"
    ><pre class="cell-pre" [ngClass]="{'overflow-hidden-class': this.tableService.isEllipsis}">{{item[modelName]}}</pre></div>

  </div>
  <div *ngSwitchCase="'select'">
    <div
      style="word-break: break-all;"
      [ngStyle]="textStyle"
      [title]="this.tableService.isEllipsis ==true ? selectCellText : ''"
      [ngClass]="{'overflow-hidden-class' : this.tableService.isEllipsis}"
      class="{{ textClass }}"
    >{{selectCellText}}</div>
  </div>

  <div *ngSwitchCase="'link'">
    <a
      style="cursor: pointer; word-break: break-all;"
      [ngStyle]="textStyle"
      (click)="textClickFn()"
      [title]="this.tableService.isEllipsis ==true ? item[modelName] : ''"
      [ngClass]="{'overflow-hidden-class': this.tableService.isEllipsis}"
      class="{{ textClass }}"
    >{{item[modelName]}}</a>
  </div>

  <div *ngSwitchCase="'button'">
    <ng-template [hyTemplateWrapper]="itemTemplate" [item]="item" [index]="index"></ng-template>
  </div>
  <div *ngSwitchCase="'template'">
    <ng-template [hyTemplateWrapper]="itemTemplate" [item]="item" [index]="index"></ng-template>
  </div>

  <div *ngSwitchCase="'progress'">
    <div style="position: relative;">
      <div class="progress" style="text-indent: 0; height: 20px; border-radius: 4px !important; box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.1); margin-bottom: 0px;">
        <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" [ngStyle]="{width: item ? item[modelName] + '%' : '0%'}">
          <div style="left: 40%; color: black; position: absolute; z-index: 100;">{{ item ? item[modelName] + "%" : "0%" }}</div>
        </div>
      </div>
    </div>
  </div>
  <div *ngSwitchDefault></div>
</div>
