<div class="hy-col-{{flex == undefined ? cols : 0}}"
     [ngStyle]="{display: flex == undefined ? 'block' : 'inline-block'}">
  <nz-form-item class="hy-form-item">
    <nz-form-control [ngStyle]="{width: flex == undefined ? '100%' : flex,'max-width': flex == undefined ? '100%' : flex}">
      <nz-upload
        [nzMultiple]="multiple"
        [nzAction]="url"
        [nzCustomRequest]="customRequest"
        [nzFileList]="fileList"
        (nzFileListChange)="_fileListChange($event)"
        (nzChange)="change($event)"
        [nzShowUploadList]="false"
        [nzFilter]="_filter"
        [nzBeforeUpload]="beforeUpload"
      >
        <button nz-button type="button">
          <i nz-icon nzType="upload"  ></i><span>{{ uploadButtonTitle || i18nService.getFrameI18n('hy-upload.上传') }}</span>
        </button>
      </nz-upload>

      <button
        [ngStyle]="{margin: layoutType == 'inline' ? '0 0 0 10px' : '10px 0 0 10px'}"
        [nzLoading]="uploading"
        [disabled]="fileList.length == 0"
        nz-button
        [nzType]="'primary'"
        (click)="handleUpload()"
        *ngIf="!hideUploadButton && url"
      >
        {{ uploading ? uploadingTitle || i18nService.getFrameI18n('hy-upload.上传中') : uploadStartTitle || i18nService.getFrameI18n('hy-upload.开始上传')}}
      </button>

      <ng-container *ngIf="_showFileName">
        <span [ngStyle]="{'display':layoutType == 'inline' ? 'inline-block' : 'block'}" >
           <span class="file-name" [ngClass]="{'layoutType-vertical-fileName' : layoutType == 'vertical'}" *ngFor="let file of fileNameList">
            <span class="file-name-margin" [ngStyle]="{'display':layoutType == 'inline' ? 'inline-block' : 'block'}">
            <span class="paper-clip">
              <hy-icon nzIconName="paper-clip" [iconStyle]="{color: 'rgba(0, 0, 0, 0.45)',fontSize:' 13px'}"></hy-icon>
            </span>
            <span class="file-name-hover" [title]="file.name" [ngStyle]="{width:fileWidth}">{{file.name}}</span>
            <span class="delete-icon" (click)="remove(file)" [title]="i18nService.getFrameI18n('hy-upload.删除文件')">
              <hy-icon nzIconName="delete" [iconStyle]="{color: 'rgba(0, 0, 0, 0.45)',fontSize:' 12px'}"></hy-icon>
            </span>
           </span>
         </span>
        </span>
      </ng-container>
    </nz-form-control>
  </nz-form-item>
</div>
